<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reusable Data Table Component</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8">
<div id="app"></div>

<script>
/**
 * Reusable sortable data table with search, pagination, and CRUD actions.
 * Usage: new DataTable('#app', { columns, data, onEdit, onDelete })
 */
class DataTable {
  constructor(selector, config) {
    this.el = document.querySelector(selector);
    this.columns = config.columns || [];
    this.data = config.data || [];
    this.filteredData = [...this.data];
    this.page = 1;
    this.perPage = config.perPage || 10;
    this.sortCol = null;
    this.sortDir = 'asc';
    this.searchTerm = '';
    this.onEdit = config.onEdit || null;
    this.onDelete = config.onDelete || null;
    this.render();
  }

  setData(data) {
    this.data = data;
    this.applyFilters();
  }

  applyFilters() {
    const term = this.searchTerm.toLowerCase();
    this.filteredData = this.data.filter(row =>
      this.columns.some(col => String(row[col.key] || '').toLowerCase().includes(term))
    );
    if (this.sortCol) {
      this.filteredData.sort((a, b) => {
        const va = a[this.sortCol] ?? '';
        const vb = b[this.sortCol] ?? '';
        const cmp = va < vb ? -1 : va > vb ? 1 : 0;
        return this.sortDir === 'asc' ? cmp : -cmp;
      });
    }
    this.page = 1;
    this.render();
  }

  get pageData() {
    const start = (this.page - 1) * this.perPage;
    return this.filteredData.slice(start, start + this.perPage);
  }

  get totalPages() {
    return Math.ceil(this.filteredData.length / this.perPage);
  }

  render() {
    const pageData = this.pageData;
    this.el.innerHTML = `
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="p-4 border-b flex items-center gap-4">
          <input type="text" placeholder="Search..." value="${this.searchTerm}"
            class="flex-1 px-4 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
            oninput="this.closest('[data-table]').__table.searchTerm=this.value;this.closest('[data-table]').__table.applyFilters()">
          <span class="text-sm text-gray-500">${this.filteredData.length} results</span>
        </div>
        <table class="w-full">
          <thead class="bg-gray-50 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
            <tr>
              ${this.columns.map(col => `
                <th class="px-4 py-3 cursor-pointer hover:bg-gray-100 select-none"
                  onclick="this.closest('[data-table]').__table.sort('${col.key}')">
                  ${col.label} ${this.sortCol === col.key ? (this.sortDir === 'asc' ? '↑' : '↓') : ''}
                </th>`).join('')}
              ${this.onEdit || this.onDelete ? '<th class="px-4 py-3 w-24">Actions</th>' : ''}
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-100">
            ${pageData.map(row => `
              <tr class="hover:bg-blue-50 transition-colors">
                ${this.columns.map(col => `<td class="px-4 py-3 text-sm">${row[col.key] ?? ''}</td>`).join('')}
                ${this.onEdit || this.onDelete ? `<td class="px-4 py-3 text-sm flex gap-2">
                  ${this.onEdit ? `<button onclick="this.closest('[data-table]').__table.onEdit(${JSON.stringify(row).replace(/"/g, '&quot;')})" class="text-blue-600 hover:text-blue-800">Edit</button>` : ''}
                  ${this.onDelete ? `<button onclick="this.closest('[data-table]').__table.onDelete(${JSON.stringify(row).replace(/"/g, '&quot;')})" class="text-red-600 hover:text-red-800">Delete</button>` : ''}
                </td>` : ''}
              </tr>`).join('')}
          </tbody>
        </table>
        <div class="p-4 border-t flex items-center justify-between text-sm text-gray-600">
          <span>Page ${this.page} of ${this.totalPages || 1}</span>
          <div class="flex gap-2">
            <button class="px-3 py-1 border rounded hover:bg-gray-100 ${this.page <= 1 ? 'opacity-50' : ''}"
              onclick="this.closest('[data-table]').__table.prevPage()" ${this.page <= 1 ? 'disabled' : ''}>Prev</button>
            <button class="px-3 py-1 border rounded hover:bg-gray-100 ${this.page >= this.totalPages ? 'opacity-50' : ''}"
              onclick="this.closest('[data-table]').__table.nextPage()" ${this.page >= this.totalPages ? 'disabled' : ''}>Next</button>
          </div>
        </div>
      </div>`;
    this.el.setAttribute('data-table', '');
    this.el.__table = this;
  }

  sort(col) {
    if (this.sortCol === col) this.sortDir = this.sortDir === 'asc' ? 'desc' : 'asc';
    else { this.sortCol = col; this.sortDir = 'asc'; }
    this.applyFilters();
  }

  nextPage() { if (this.page < this.totalPages) { this.page++; this.render(); } }
  prevPage() { if (this.page > 1) { this.page--; this.render(); } }
}

// Demo usage
const table = new DataTable('#app', {
  columns: [
    { key: 'id', label: 'ID' },
    { key: 'name', label: 'Name' },
    { key: 'email', label: 'Email' },
    { key: 'role', label: 'Role' },
  ],
  data: [
    { id: 1, name: 'Alice Johnson', email: 'alice@example.com', role: 'Admin' },
    { id: 2, name: 'Bob Smith', email: 'bob@example.com', role: 'User' },
    { id: 3, name: 'Carol Williams', email: 'carol@example.com', role: 'Editor' },
    { id: 4, name: 'Dave Brown', email: 'dave@example.com', role: 'User' },
    { id: 5, name: 'Eve Davis', email: 'eve@example.com', role: 'Admin' },
  ],
  onEdit: (row) => alert('Edit: ' + row.name),
  onDelete: (row) => alert('Delete: ' + row.name),
});
</script>
</body>
</html>
