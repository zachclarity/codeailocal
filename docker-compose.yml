version: "3.9"

services:
  # ─── Ollama LLM Server ───────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: localcoder-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # ── Uncomment below ONLY if you have NVIDIA GPU + nvidia-container-toolkit ──
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  # ─── Model Bootstrapper (pulls Qwen2.5-Coder on first run) ──

  # ─── Go Backend API ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: localcoder-backend
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - PORT=8080
      - RAG_DATA_PATH=/data/rag/snippets.json
      - WORKSPACE_PATH=/workspace
    volumes:
      - rag_data:/data/rag
      - ${WORKSPACE_DIR:-./workspace}:/workspace:ro

    
    restart: unless-stopped

  # ─── Frontend (Nginx) ───────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: localcoder-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ollama_data:
  rag_data:
